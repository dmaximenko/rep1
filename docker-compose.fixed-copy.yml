services:
  youtube-trends:
    image: node:18-alpine
    container_name: youtube-trends-app
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - YOUTUBE_API_KEY=AIzaSyCxX0SJHltky5-u5bGUVxs6I8monl6ivTA
      - GOOGLE_SHEET_ID=1thBbHkx3OTGcXou6UFYW9iN9fd9Hb2rd-LnwkJj6Pws
      - GOOGLE_SHEETS_CREDENTIALS_FILE=credentials.json
    volumes:
      - youtube-trends-data:/app
    restart: unless-stopped
    command: ["sh", "-c", "apk add --no-cache git curl && rm -rf /tmp/app && git clone https://github.com/dmaximenko/rep1.git /tmp/app && cp -r /tmp/app/. /app/ && npm install && npm start"]

volumes:
  youtube-trends-data:
